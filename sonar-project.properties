# SonarCloud Configuration for FogUI Monorepo
# Documentation: https://docs.sonarcloud.io/advanced-setup/ci-based-analysis/sonarscanner-cli/

sonar.projectKey=kutaybuyukkorukcu_FogUI
sonar.organization=kutaybuyukkorukcu
sonar.projectName=FogUI

# Host
sonar.host.url=https://sonarcloud.io

# Encoding
sonar.sourceEncoding=UTF-8

# ================================
# Monorepo Module Definitions
# ================================
# Note: active OSS modules are analyzed here.
# SonarCloud community tier enforces 80% coverage Quality Gate
sonar.modules=java-core,spring-starter,spring-web-starter,backend,react-package

# ================================
# FogUI Java Core
# ================================
java-core.sonar.projectBaseDir=packages/fogui-java-core
java-core.sonar.projectName=FogUI Java Core
java-core.sonar.sources=src/main/java
java-core.sonar.tests=src/test/java
java-core.sonar.java.binaries=target/classes
java-core.sonar.java.libraries=target/dependency/*.jar
java-core.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
java-core.sonar.junit.reportPaths=target/surefire-reports

# ================================
# FogUI Spring Starter
# ================================
spring-starter.sonar.projectBaseDir=packages/fogui-spring-boot-starter
spring-starter.sonar.projectName=FogUI Spring Starter
spring-starter.sonar.sources=src/main/java
spring-starter.sonar.tests=src/test/java
spring-starter.sonar.java.binaries=target/classes
spring-starter.sonar.java.libraries=target/dependency/*.jar
spring-starter.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
spring-starter.sonar.junit.reportPaths=target/surefire-reports

# ================================
# FogUI Spring Web Starter
# ================================
spring-web-starter.sonar.projectBaseDir=packages/fogui-spring-web-starter
spring-web-starter.sonar.projectName=FogUI Spring Web Starter
spring-web-starter.sonar.sources=src/main/java
spring-web-starter.sonar.tests=src/test/java
spring-web-starter.sonar.java.binaries=target/classes
spring-web-starter.sonar.java.libraries=target/dependency/*.jar
spring-web-starter.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
spring-web-starter.sonar.junit.reportPaths=target/surefire-reports

# ================================
# Backend (Java Spring Boot)
# ================================
backend.sonar.projectBaseDir=backend-java
backend.sonar.projectName=Backend (Java)
backend.sonar.sources=src/main/java
backend.sonar.tests=src/test/java
backend.sonar.java.binaries=target/classes
backend.sonar.java.libraries=target/dependency/*.jar
backend.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
backend.sonar.junit.reportPaths=target/surefire-reports

# ================================
# React Package (@fogui/react)
# ================================
react-package.sonar.projectBaseDir=packages/react
react-package.sonar.projectName=React Package (@fogui/react)
react-package.sonar.sources=src
react-package.sonar.tests=src/__tests__
react-package.sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
react-package.sonar.exclusions=**/node_modules/**,**/dist/**
react-package.sonar.coverage.exclusions=src/types/adapter.ts,src/types/canonical.ts,src/types/schema.ts
react-package.sonar.typescript.tsconfigPath=tsconfig.json
react-package.sonar.javascript.lcov.reportPaths=coverage/lcov.info
react-package.sonar.typescript.lcov.reportPaths=coverage/lcov.info
