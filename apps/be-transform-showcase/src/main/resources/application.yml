server:
  port: 5001

spring:
  application:
    name: fogui-backend
  
  # Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/fogui}
    username: ${DATABASE_USER:fogui}
    password: ${DATABASE_PASSWORD:fogui_secret}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  # Flyway Migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Spring AI Configuration (OpenAI-compatible only)
  ai:
    # OPENAI_BASE_URL allows using OpenAI-compatible providers when needed.
    openai:
      api-key: ${OPENAI_API_KEY:${GROQ_API_KEY:}}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4.1-nano}
          temperature: 0.0

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-min-32-chars}
  expiration-hours: ${JWT_EXPIRATION_HOURS:24}

# FogUI deterministic generation policy
fogui:
  deterministic:
    temperature: ${FOGUI_TEMPERATURE:0.0}
    top-p: ${FOGUI_TOP_P:1.0}
    capabilities:
      temperature: ${FOGUI_CAP_TEMPERATURE:true}
      top-p: ${FOGUI_CAP_TOP_P:true}
      seed: ${FOGUI_CAP_SEED:true}
      max-tokens: ${FOGUI_CAP_MAX_TOKENS:true}
      max-completion-tokens: ${FOGUI_CAP_MAX_COMPLETION_TOKENS:true}
  advisors:
    enabled: ${FOGUI_ADVISORS_ENABLED:true}
    fail-fast: ${FOGUI_ADVISORS_FAIL_FAST:true}
    deterministic-options:
      enabled: ${FOGUI_ADVISORS_DETERMINISTIC_OPTIONS_ENABLED:true}
    canonical-validation:
      enabled: ${FOGUI_ADVISORS_CANONICAL_VALIDATION_ENABLED:true}

# Logging
logging:
  level:
    com.fogui: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.client: DEBUG
    org.springframework.http.client: DEBUG
    org.springframework.http: DEBUG
    org.apache.hc.client: DEBUG
    org.apache.catalina: DEBUG

# Sentry Error Monitoring
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:development}
  traces-sample-rate: 1.0
  send-default-pii: false
  exception-resolver-order: -2147483647
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info
